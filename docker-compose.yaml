x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
    AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
    JAVA_HOME: /usr/local/java
    MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
    MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
  volumes:
    - ./airflow-volumes/dags:/opt/airflow/dags
    - ./airflow-volumes/logs:/opt/airflow/logs
    - ./airflow-volumes/plugins:/opt/airflow/plugins
    - ./spark-jobs:/opt/spark-jobs
    - ./scripts:/opt/scripts
    - ./reports:/opt/airflow/reports
    - ./config:/opt/airflow/config
  depends_on:
    airflow-postgres:
      condition: service_healthy
  networks:
    - lakehouse-net

x-superset-common: &superset-common
  build:
    context: .
    dockerfile: Dockerfile.superset
  platform: linux/amd64
  environment:
    SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-changeme_in_production_32chars}
    SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
    SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
    SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@superset.com}
    SQLALCHEMY_DATABASE_URI: sqlite:////app/superset_home/superset.db
    SUPERSET_LOAD_EXAMPLES: "false"
  volumes:
    - superset-home:/app/superset_home
  networks:
    - lakehouse-net

services:
  # ─────────────────────────────── Postgres ────────────────────────────────
  airflow-postgres:
    image: postgres:15
    platform: linux/arm64
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    networks:
      - lakehouse-net

  # ───────────────────────────── Airflow init ───────────────────────────────
  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username ${AIRFLOW_ADMIN_USERNAME:-admin} \
          --password ${AIRFLOW_ADMIN_PASSWORD:-admin} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
    restart: "no"

  # ─────────────────────────── Airflow webserver ───────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy

  # ─────────────────────────── Airflow scheduler ───────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy

  # ──────────────────────────── Spark master ───────────────────────────────
  spark-master:
    image: apache/spark:3.5.3
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - ./spark-jobs:/opt/spark-jobs
      - ./scripts:/opt/scripts
      - ./config:/opt/airflow/config
    networks:
      - lakehouse-net

  # ──────────────────────────── Spark worker ───────────────────────────────
  spark-worker:
    image: apache/spark:3.5.3
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 1g
      SPARK_WORKER_CORES: "1"
    depends_on:
      - spark-master
    volumes:
      - ./spark-jobs:/opt/spark-jobs
      - ./scripts:/opt/scripts
      - ./config:/opt/airflow/config
    networks:
      - lakehouse-net

  # ────────────────────────────── MinIO ────────────────────────────────────
  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse-net

  # ────────────────────── MinIO Client (bucket setup) ──────────────────────
  mc:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin123};
        mc mb --ignore-existing local/warehouse;
        echo 'Bucket created: warehouse';
        exit 0;
      "
    env_file: .env
    networks:
      - lakehouse-net

  # ──────────────────────── Project Nessie (Iceberg catalog) ──────────────
  nessie:
    image: projectnessie/nessie:latest
    ports:
      - "19120:19120"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/19120"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - lakehouse-net

  # ─────────────────────────────── Trino ───────────────────────────────────
  trino:
    image: trinodb/trino:442
    ports:
      - "8082:8080"   # Trino UI & API
    volumes:
      - ./trino-conf:/etc/trino
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      minio:
        condition: service_healthy
      nessie:
        condition: service_healthy
    networks:
      - lakehouse-net

  # ────────────────────────── Superset init ────────────────────────────────
  superset-init:
    <<: *superset-common
    command: ["/bin/bash", "/app/superset-init/init.sh"]
    volumes:
      - superset-home:/app/superset_home
      - ./superset-init:/app/superset-init
    depends_on:
      trino:
        condition: service_healthy
    restart: "no"

  # ─────────────────────────── Superset UI ─────────────────────────────────
  superset:
    <<: *superset-common
    command:
      - gunicorn
      - --bind=0.0.0.0:8088
      - --workers=2
      - --timeout=120
      - --keep-alive=5
      - superset.app:create_app()
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      superset-init:
        condition: service_completed_successfully
    restart: unless-stopped

networks:
  lakehouse-net:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  superset-home:
